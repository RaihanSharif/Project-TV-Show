<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TV Show Project | Raihan Sharif (RaihanSharif)</title>
        <link href="style.css" rel="stylesheet" />
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
            rel="stylesheet" />
        <script src="script.js" type="module"></script>
    </head>

    <body>
        <header>
            <h1>CYF TV Guide</h1>
        </header>
        <main>
            <h1>Browse and search tv shows.</h1>
            <div id="controls-container">
                <select name="select-show" id="select-show">
                    <option value="none">-- SELECT SHOW --</option>
                </select>
                <div id="select-episode-container" class="find-episodes">
                    <!-- <label for select not necessary if default option explains the use </label> -->
                    <select name="select-episodes" id="select-episodes">
                        <option value="none" selected>
                            -- SELECT EPISODE --
                        </option>
                    </select>
                    <button id="undo-selected-episode" hidden>Show all</button>
                </div>
                <div id="search-container" class="find-episodes">
                    <label for="search-input">Search: </label>
                    <input
                        type="search"
                        name="search-input"
                        id="search-input" />
                    <span id="result-count"></span>
                </div>
            </div>
            <div id="card-container">
                <h2>Loading episode data...</h2>
            </div>
        </main>
        <template id="episode-card-template">
            <div class="episode-card">
                <div class="title-container">
                    <h2 class="episode-title"></h2>
                </div>
                <img class="episode-img" src="" alt="" />
                <p class="episode-desc"></p>
            </div>
        </template>
        <footer>
            Episode information from
            <a href="http://www.tvmaze.com">TVMaze.com</a>
        </footer>
    </body>
</html>
