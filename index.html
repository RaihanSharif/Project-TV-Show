<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TV Show Project | Raihan Sharif (RaihanSharif)</title>
        <link href="style.css" rel="stylesheet" />
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
            rel="stylesheet" />
    </head>

    <body>
        <header>


            </div>
            <h1>CYF</h1>
            <div id="select-episode-container" class="find-episodes">
                <label for="select-episodes">Select a specifc episode: </label>
                <select name="select-episodes" id="select-episodes">
                    <option value="none" selected>-- Please select an episode to see --</option>
                </select>
            </div>
            <div id="search-container" class="find-episodes">
                <label for="search-input">Search: </label>
                <input type="search" name="search-input" id="search-input" />
                <span id="result-count"></span>
            </div>
        </header>
        <main>
            <h1>Browse and search tv shows.</h1>
            <section id="card-container"></section>
        </main>
        <template id="episode-card-template">
            <div class="episode-card">
                <div class="title-container">
                    <h2 class="episode-title"></h2>
                </div>
                <img class="episode-img" src="" alt="" />
                <p class="episode-desc"></p>
            </div>
        </template>
        <footer>
            Episode information from
            <a href="http://www.tvmaze.com">TVMaze.com</a>
        </footer>

        <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
        <script src="episodes.js"></script>

        <!-- Loads YOUR javascript code -->
        <script src="script.js"></script>
    </body>
</html>
